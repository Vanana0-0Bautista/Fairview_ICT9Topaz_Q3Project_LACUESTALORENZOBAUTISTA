<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Created</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f7efe9, #f2dada);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
        }

        .brand-title {
            font-family: 'Playfair Display', cursive;
            font-size: 1.3rem;
            color: #5b3a29;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .nav-link {
            color: #222;
            font-weight: 500;
            margin-left: 16px;
            transition: 0.2s ease;
        }

        .nav-link:hover {
            color: #d48c8c;
        }

        #logo {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border: 2px solid #5b3a29;
            background: white;
            padding: 5px;
        }

        .btn-book {
            color: #5b3a29;
            text-decoration: underline;
            font-weight: 500;
            margin-right: 12px;
        }

        .btn-book:hover {
            color: #d48c8c;
        }

        .btn-create {
            background-color: #5b3a29;
            color: white;
            border-radius: 25px;
            padding: 8px 18px;
            border: none;
            transition: 0.2s ease;
        }

        .btn-create:hover {
            background-color: #3f281d;
        }

        .intro-container {
            background: white;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px 60px;     
            border-radius: 0;         
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;       
        }

        .intro-image {
            width: 50%;
            max-width: 220px;
            height: 180px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 0;          
        }

        .intro-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
        }

        .dropdown-btn {
            background-color: #5b3a29;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .dropdown-btn:hover {
            background-color: #3f281d;
        }

        .card {
        width: min(700px, 95%);
        margin: 80px auto 60px auto; /* pushes away from navbar */
        background: white;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        padding: 30px;
    }

    h1 {
        font-family: 'Playfair Display', cursive;
        font-size: 1.6rem;
        color: #5b3a29;
        margin-bottom: 10px;
    }

    .sub {
        font-size: 0.9rem;
        color: #555;
        margin-bottom: 20px;
    }

    .profile {
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 20px;
        align-items: center;
        padding: 20px;
        background: #fafafa;
        border: 1px solid #ddd;
    }

    .avatar {
        width: 100px;
        height: 100px;
        border: 2px solid #5b3a29;
        background: #f7efe9;
        overflow: hidden;
        display: grid;
        place-items: center;
    }

    .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
    }

    .item {
        margin-bottom: 8px;
        font-size: 0.95rem;
        color: #333;
    }

    .item b {
        color: #5b3a29;
    }

    .btnRow {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        background-color: #5b3a29;
        color: white;
        border-radius: 25px;
        padding: 8px 18px;
        border: none;
        cursor: pointer;
        transition: 0.2s ease;
        text-decoration: none;
    }

    .btn:hover {
        background-color: #3f281d;
    }


        @media (max-width: 768px) {
            .intro-container {
                padding: 20px 20px;
            }
            .intro-image {
                width: 70%;
                max-width: 180px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md shadow-sm py-3">
    <div class="container-fluid d-flex align-items-center justify-content-between">

        <div class="d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2 me-3" href="#">
                <img src="https://i.pinimg.com/736x/e9/8e/dc/e98edc87f1f020bd29c92becef903b9e.jpg" 
                     alt="cheetah logo" 
                     class="rounded-circle img-fluid" 
                     id="logo">
                <span class="brand-title">Passenger Princess</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="Project.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                </ul>
            </div>
        </div>

        <div class="d-none d-md-flex align-items-center">
            <a href="#" class="btn-book">Book Now</a>
            <a href="Register form.html" class="btn btn-create">Create Account</a>
        </div>
    </div>
    </nav>

  <div class="card">
    <header>
      <h1>🎉 Account created successfully</h1>
      <p class="sub">Your details were saved and loaded from localStorage.</p>
    </header>

    <div class="content">
      <div class="profile">
        <div class="avatar">
          <span id="avatarFallback"></span>
          <img id="avatarImg" alt="Profile photo" />
        </div>

        <div class="grid" id="details">

        </div>
      </div>

      <div class="btnRow">
        <a class="btn primary" href="Register form.html">Create another account</a>
        <button class="btn" id="clearBtn" type="button">Clear saved data</button>
      </div>

      <br>

      <div class="note">
        If you open this page without creating an account first, it won’t find data.
      </div>
    </div>
  </div>

  <script>
    const details = document.getElementById("details");
    const avatarImg = document.getElementById("avatarImg");
    const avatarFallback = document.getElementById("avatarFallback");
    const clearBtn = document.getElementById("clearBtn");

    const raw = localStorage.getItem("createdAccount");

    if (!raw) {
      details.innerHTML = `
        <div class="item"><b>Status</b><span> No saved account found.</span></div>
        <div class="item"><b>Tip</b><span> Go back and submit the form first.</span></div>
      `;
    } else {
      const user = JSON.parse(raw);

      details.innerHTML = `
        <div class="item"><b>Full Name</b><span>${user.fullName}</span></div>
        <div class="item"><b>Username</b><span>@${user.username}</span></div>
        <div class="item"><b>Email</b><span>${user.email}</span></div>
        <div class="item"><b>Birthday</b><span>${user.birthday}</span></div>
      `;

      if (user.profilePicDataUrl) {
        avatarImg.src = user.profilePicDataUrl;
        avatarImg.style.display = "block";
        avatarFallback.style.display = "none";
      }
    }

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem("createdAccount");
      window.location.reload();
    });
  </script>
</body>

</html>
