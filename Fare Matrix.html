<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Princess</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f7efe9, #f2dada);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .brand-title {
            font-family: 'Playfair Display', cursive;
            font-size: 1.3rem; /* smaller logo name */
            color: #5b3a29;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .nav-link {
            color: #222;
            font-weight: 500;
            margin-left: 16px;
            transition: 0.2s ease;
        }

        .nav-link:hover {
            color: #d48c8c;
        }

        #logo {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border: 2px solid #5b3a29;
            background: white;
            padding: 5px;
        }

        /* CTA buttons */
        .btn-book {
            color: #5b3a29;
            text-decoration: underline;
            font-weight: 500;
            margin-right: 12px;
        }

        .btn-book:hover {
            color: #d48c8c;
        }

        .btn-create {
            background-color: #5b3a29;
            color: white;
            border-radius: 25px;
            padding: 8px 18px;
            border: none;
            transition: 0.2s ease;
        }

        .btn-create:hover {
            background-color: #3f281d;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-md shadow-sm py-3">
    <div class="container-fluid d-flex align-items-center justify-content-between">

        <!-- Left side: Logo + name + nav links -->
        <div class="d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2 me-3" href="#">
                <img src="https://i.pinimg.com/736x/e9/8e/dc/e98edc87f1f020bd29c92becef903b9e.jpg" 
                     alt="cheetah logo" 
                     class="rounded-circle img-fluid" 
                     id="logo">
                <span class="brand-title">Passenger Princess</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="Project.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Project.html">Fare Matrix</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Help</a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Right side: CTA buttons -->
        <div class="d-none d-md-flex align-items-center">
            <a href="#" class="btn-book">Book Now</a>
            <a href="Register form.html" class="btn btn-create">Create Account</a>
        </div>

    </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
